<!doctype html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fényertek | Hamarosan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #ffffff;
      --bg-2: #ffffff;
      --ink: #1f1a14;
      --ink-soft: #5c4e3f;
      --accent: #d36a2e;
      --panel: rgba(255, 255, 255, 0.62);
      --ring: rgba(31, 26, 20, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background: #ffffff;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: auto;
    }

    .shape {
      position: fixed;
      border-radius: 999px;
      filter: blur(2px);
      opacity: 0;
      z-index: 0;
      animation: drift 11s ease-in-out infinite alternate;
    }

    .shape.one {
      width: 220px;
      height: 220px;
      right: -40px;
      bottom: -70px;
      background: #e09a68;
    }

    .shape.two {
      width: 180px;
      height: 180px;
      left: -50px;
      top: 10%;
      background: #a88f76;
      animation-duration: 14s;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(680px, 100%);
      border: 1px solid var(--ring);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      padding: clamp(28px, 5vw, 56px);
      text-align: center;
      box-shadow: 0 30px 80px rgba(31, 26, 20, 0.16);
      animation: reveal 900ms ease-out both;
    }

    .logo-wrap {
      margin-inline: auto;
      margin-bottom: 26px;
      width: min(280px, 65vw);
      animation: float 5s ease-in-out infinite;
    }

    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 14px 24px rgba(31, 26, 20, 0.18));
    }

    h1 {
      margin: 0;
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: clamp(1.9rem, 5.2vw, 2.9rem);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      line-height: 1;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    p {
      margin: 16px auto 0;
      max-width: 42ch;
      color: var(--ink-soft);
      font-size: clamp(1rem, 2.8vw, 1.15rem);
      line-height: 1.6;
    }

    .socials {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .social-link {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      border: 1px solid var(--ring);
      color: var(--ink);
      background: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .social-link:hover {
      transform: translateY(-2px);
      border-color: rgba(211, 106, 46, 0.45);
      box-shadow: 0 10px 24px rgba(31, 26, 20, 0.14);
    }

    .social-link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .social-link svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .tag {
      margin-top: 26px;
      display: inline-block;
      border-radius: 999px;
      border: 1px solid rgba(211, 106, 46, 0.4);
      background: rgba(211, 106, 46, 0.08);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.78rem;
      padding: 10px 14px;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes float {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes drift {
      from {
        transform: translateY(0) translateX(0);
      }
      to {
        transform: translateY(-20px) translateX(15px);
      }
    }

    @media (max-width: 480px) {
      .card {
        border-radius: 22px;
      }

      .logo-wrap {
        width: min(220px, 70vw);
      }
    }
  </style>
</head>
<body>
  <div class="shape one" aria-hidden="true"></div>
  <div class="shape two" aria-hidden="true"></div>

  <main class="card" role="main">
    <div class="logo-wrap">
      <img src="fenyertek_logo.png" alt="Fényertek logo" />
    </div>
    <h1>Hamarosan</h1>
    <p>
      Megnyitjuk webboltunkat, már csak az utolsó simítások vannak hátra. Addig is kövess minket a közösségi média felületeinken, hogy elsőként értesülj a legfrissebb hírekről és akciókról!
    </p>
    <nav class="socials" aria-label="Közösségi média">
      <a class="social-link" href="#" aria-label="Facebook" title="Facebook">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M13.5 21v-8h2.7l.4-3h-3.1V8.1c0-.9.3-1.5 1.6-1.5h1.7V4c-.3 0-1.3-.1-2.5-.1-2.5 0-4.2 1.5-4.2 4.3V10H8v3h2.1v8h3.4z" />
        </svg>
      </a>
      <a class="social-link" href="#" aria-label="Instagram" title="Instagram">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm0 2a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3H7zm11.2 1.5a1.3 1.3 0 1 1 0 2.6 1.3 1.3 0 0 1 0-2.6zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" />
        </svg>
      </a>
      <a class="social-link" href="#" aria-label="TikTok" title="TikTok">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M14.5 3c.3 1.9 1.4 3.2 3.2 3.9V10a7 7 0 0 1-3.2-1v6.2a5.2 5.2 0 1 1-4-5.1V13a2.6 2.6 0 1 0 1.4 2.3V3h2.6z" />
        </svg>
      </a>
    </nav>
  </main>
</body>
</html>
